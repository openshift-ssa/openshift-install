site_name: OpenShift Install Guide
site_description: A repository for OpenShift installation guides and reference material
site_url: https://openshift-ssa.github.io/openshift-install

repo_name: openshift-ssa/openshift-install
repo_url: https://github.com/openshift-ssa/openshift-install

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: red
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Install:
      - Overview: installation/index.md
      - RHEL Install: installation/rhel-install.md
      - Alternative ISO Serving: installation/httpd.md
  - Post-Install:
      - Overview: post-installation/index.md
      - Configure Registry: post-installation/configure-registry.md
      - Add Worker Node: post-installation/add-worker-node.md
      - Rotate SSH Keys: post-installation/rotate-ssh-keys.md
  - Networking:
      - Overview: networking/index.md
  - Virtualization:
      - Overview: virtualization/index.md
  - Storage:
      - Overview: storage/index.md
  - Hub Cluster:
      - Overview: hub/index.md
  - Notes:
      - Overview: notes/index.md
      - Base64 and MachineConfig: notes/create-machine-config.md
  - Troubleshooting:
      - Overview: troubleshooting/index.md
